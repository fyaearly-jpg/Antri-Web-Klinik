<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Petugas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#e0f2f1] min-h-screen flex items-center justify-center p-6">
    <div class="max-w-[400px] w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden">
        <div class="h-40 bg-[#117a55] flex items-center justify-center">
            <h1 class="text-white text-3xl font-bold">Admin Login</h1>
        </div>
        <form action="DashboardAntri.html" class="p-8 space-y-4">
            <input type="text" placeholder="Username" required class="w-full px-5 py-3 rounded-xl border-2 border-[#80cbc4] outline-none focus:border-[#117a55]">
            <input type="password" placeholder="Password" required class="w-full px-5 py-3 rounded-xl border-2 border-[#80cbc4] outline-none focus:border-[#117a55]">
            <button type="submit" class="w-full bg-[#117a55] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-[#0d6345] transition">MASUK</button>
        </form>
    </div>
</body>
</html>
