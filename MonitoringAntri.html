<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Monitoring Petugas - Antrian Klinik</title>
</head>
<body class="bg-slate-50 p-4 md:p-6">
    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Panel Petugas Klinik</h1>
                <p class="text-sm text-slate-500">Kelola antrean pasien secara real-time</p>
            </div>
            <button onclick="if(confirm('Hapus semua data hari ini?')) { localStorage.clear(); location.reload(); }" 
                    class="text-xs font-semibold text-red-500 hover:text-red-700 underline decoration-dotted">
                Reset Hari Ini
            </button>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            
            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[600px]">
                <div class="bg-blue-600 p-6 text-white shrink-0">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-bold">Antrean Masuk</h2>
                        <span class="bg-blue-400/30 text-[10px] px-2 py-1 rounded-full border border-blue-300">Live</span>
                    </div>
                    <p class="text-blue-100 text-sm mt-1">Pasien yang baru mendaftar akan muncul di sini</p>
                </div>
                
                <div class="p-4 overflow-y-auto flex-grow" id="daftar-antrean">
                    <div class="flex items-center justify-center h-full">
                        <p class="text-slate-400 italic">Memuat data...</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[600px]">
                <div class="bg-slate-800 p-6 text-white shrink-0">
                    <h2 class="text-xl font-bold">Riwayat Panggilan</h2>
                    <p class="text-slate-400 text-sm mt-1">Daftar pasien yang sudah dipanggil</p>
                </div>
                
                <div class="overflow-auto flex-grow">
                    <table class="w-full text-left">
                        <thead class="sticky top-0 bg-slate-50 text-slate-500 text-[10px] uppercase tracking-wider border-b">
                            <tr>
                                <th class="p-4 font-semibold">Jam</th>
                                <th class="p-4 font-semibold">Nama Pasien</th>
                                <th class="p-4 font-semibold">Unit Poli</th>
                                <th class="p-4 font-semibold text-right">Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-riwayat" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
            </div>

        </div>
    </div>

    <script src="MonitoringAntri.js"></script>
</body>
</html>
